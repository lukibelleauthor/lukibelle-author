<h1>The Crossing</h1>
<p class="scene-subtitle">
Love becomes dangerous when it chooses a side.
</p>
<p>
Anika knew the moment she should have turned back.
</p>
<p>
But his voice—calm, certain, inevitable—
felt like destiny wearing a uniform.
</p>
<p>
War was not coming.
It had already chosen her.
</p>
