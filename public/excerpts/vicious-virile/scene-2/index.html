<h1>The Predator</h1>
<p class="scene-subtitle">
Civilization hides nothing.
</p>
<p>
Manhattan glittered.
<p>Alive.</p>
<p>Unaware.</p>
</p>
<p>
Karan moved through it like a shadow with intention.
<p>The scar on his body pulsed—</p>
<p>not as a wound.</p>
<p>But as a signal.</p>
</p>
<p>
Night did not change him.
<p>It revealed him.</p>
</p>
